function makeCard(score, r, streak, canvas) {
if(!canvas) return null;
canvas.width=800; canvas.height=420;
const ctx=canvas.getContext(“2d”);
ctx.fillStyle=”#0A0A0C”; ctx.fillRect(0,0,800,420);
const g=ctx.createRadialGradient(400,210,0,400,210,300);
g.addColorStop(0,“rgba(200,150,20,0.12)”); g.addColorStop(1,“transparent”);
ctx.fillStyle=g; ctx.fillRect(0,0,800,420);
ctx.strokeStyle=“rgba(200,150,20,0.06)”; ctx.lineWidth=1;
for(let x=0;x<800;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,420);ctx.stroke();}
for(let y=0;y<420;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(800,y);ctx.stroke();}
ctx.strokeStyle=“rgba(200,150,20,0.3)”; ctx.lineWidth=1.5; ctx.strokeRect(20,20,760,380);
const bc=(x,y,dx,dy)=>{ctx.beginPath();ctx.moveTo(x,y+dy*24);ctx.lineTo(x,y);ctx.lineTo(x+dx*24,y);ctx.stroke();};
ctx.strokeStyle=”#FFD700”; ctx.lineWidth=2.5;
bc(20,20,1,1); bc(780,20,-1,1); bc(20,400,1,-1); bc(780,400,-1,-1);
ctx.font=“bold 18px Georgia,serif”; ctx.fillStyle=”#FFD700”; ctx.fillText(“T”,48,70);
ctx.font=“14px Georgia,serif”; ctx.fillStyle=”#C8A820”; ctx.fillText(“LEVEL”,64,70);
ctx.font=“10px Georgia,serif”; ctx.fillStyle=”#444”; ctx.fillText(“AI HORMONAL ANALYSIS”,48,88);
if(streak>1){ctx.font=“bold 12px Georgia,serif”;ctx.fillStyle=”#FF6B35”;ctx.textAlign=“right”;ctx.fillText(`🔥 ${streak}-DAY STREAK`,752,60);ctx.textAlign=“left”;}
ctx.font=“bold 130px Georgia,serif”; ctx.fillStyle=r.color; ctx.textAlign=“center”;
ctx.fillText(score,400,260);
ctx.font=“11px Georgia,serif”; ctx.fillStyle=”#555”; ctx.fillText(“T-INDEX SCORE”,400,140);
ctx.fillStyle=r.color+“22”; ctx.beginPath(); ctx.roundRect(330,278,140,36,6); ctx.fill();
ctx.strokeStyle=r.color; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(330,278,140,36,6); ctx.stroke();
ctx.font=“bold 13px Georgia,serif”; ctx.fillStyle=r.color; ctx.fillText(r.label,400,302);
ctx.font=“12px Georgia,serif”; ctx.fillStyle=”#666”; ctx.fillText(r.sub,400,340);
ctx.font=“11px Georgia,serif”; ctx.fillStyle=”#333”; ctx.fillText(“tlevelapp.com”,400,385);
ctx.textAlign=“left”;
return canvas.toDataURL(“image/png”);
}

        <div style={{position:"absolute",top:8,left:8,width:18,height:18,borderTop:"2px solid #FFD700",borderLeft:"2px solid #FFD700"}}/>
        <div style={{position:"absolute",top:8,right:8,width:18,height:18,borderTop:"2px solid #FFD700",borderRight:"2px solid #FFD700"}}/>
        <div style={{position:"absolute",bottom:8,left:8,width:18,height:18,borderBottom:"2px solid #FFD700",borderLeft:"2px solid #FFD700"}}/>
        <div style={{position:"absolute",bottom:8,right:8,width:18,height:18,borderBottom:"2px solid #FFD700",borderRight:"2px solid #FFD700"}}/>
      </div>
      <div style={{fontSize:12,color:"#FFD700",letterSpacing:2,textTransform:"uppercase",textAlign:"center"}}>{STAGES[stageIdx]}</div>
      <div style={{width:"100%",height:3,background:"rgba(255,255,255,0.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#C8A820,#FFD700)",borderRadius:2,width:`${progress}%`,transition:"width 0.1s ease"}}/></div>
      <div style={{fontSize:12,color:"#666",letterSpacing:2}}>{Math.round(progress)}%</div>
      <div style={{width:"100%",display:"flex",flexDirection:"column",gap:6}}>
        {STAGES.slice(0,stageIdx+1).map((st,i)=>(
          <div key={i} style={{fontSize:11,color:"#AAA",letterSpacing:1,display:"flex",alignItems:"center",gap:8,opacity:i===stageIdx?1:0.3}}>
            <span style={{color:"#FFD700"}}>{i<stageIdx?"✓":"▶"}</span> {st}
          </div>
        ))}
      </div>
    </main>
  )}

  {phase==="result"&&R&&(
    <main style={{flex:1,width:"100%",maxWidth:480,padding:"24px",display:"flex",flexDirection:"column",alignItems:"center",gap:16,zIndex:1}}>
      <div style={{display:"flex",gap:16,width:"100%",alignItems:"center"}}>
        <div style={{width:90,height:90,borderRadius:8,overflow:"hidden",position:"relative",flexShrink:0,border:"1px solid rgba(200,150,20,0.3)"}}>

          <div style={{position:"absolute",top:4,left:4,width:12,height:12,borderTop:"1.5px solid #FFD700",borderLeft:"1.5px solid #FFD700"}}/>
          <div style={{position:"absolute",bottom:4,right:4,width:12,height:12,borderBottom:"1.5px solid #FFD700",borderRight:"1.5px solid #FFD700"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#666",letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>T-INDEX SCORE</div>
          <div style={{fontSize:52,fontWeight:700,lineHeight:1,letterSpacing:-2,color:R.color}}>{score}</div>
          <div style={{display:"inline-block",fontSize:10,fontWeight:700,letterSpacing:2.5,padding:"3px 10px",borderRadius:4,marginTop:6,background:R.color+"22",border:`1px solid ${R.color}`,color:R.color}}>{R.label}</div>
          <div style={{fontSize:11,color:"#777",marginTop:4}}>{R.sub}</div>
        </div>
      </div>

      <div style={{width:"100%"}}>
        <div style={{width:"100%",height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,position:"relative",marginBottom:8}}>
          <div style={{height:"100%",borderRadius:3,background:`linear-gradient(90deg,#4A90D9,${R.color})`,width:`${(score/1000)*100}%`}}/>
          <div style={{position:"absolute",top:-5,width:16,height:16,borderRadius:"50%",background:"#0A0A0C",border:`2px solid ${R.color}`,left:`calc(${(score/1000)*100}% - 8px)`}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#444",letterSpacing:1,textTransform:"uppercase"}}><span>LOW</span><span>OPTIMAL</span><span>HIGH</span><span>ELITE</span></div>
      </div>

      <Streak streak={streak} lastScan={today}/>

      {!unlocked?(
        <div style={{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",gap:12,border:"1px solid rgba(200,150,20,0.2)",borderRadius:12,padding:"28px 20px",background:"rgba(200,150,20,0.03)"}}>
          <div style={{fontSize:36}}>🔒</div>
          <div style={{fontSize:18,fontWeight:700}}>Full Report Locked</div>
          <div style={{fontSize:13,color:"#666",textAlign:"center",lineHeight:1.5,maxWidth:280}}>Unlock facial markers, optimization protocol, share card & leaderboard entry</div>
          <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
            {["Facial Markers (5)","Optimization Protocol","Shareable Score Card","Leaderboard Entry"].map(f=>(
              <div key={f} style={{display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#AAA"}}><span style={{color:"#FFD700"}}>✓</span>{f}</div>
            ))}
          </div>
          <button onClick={()=>setShowPW(true)} style={{background:"linear-gradient(135deg,#C8A820,#FFD700)",color:"#0A0A0C",border:"none",borderRadius:8,padding:"13px 22px",fontSize:14,fontWeight:700,letterSpacing:1,display:"flex",alignItems:"center",gap:8}}>🔓 &nbsp;Unlock Full Report — $2.99</button>
          <p style={{fontSize:10,color:"#444"}}>One-time · Instant access · Secured by Stripe</p>
        </div>
      ):(
        <>
          {!namedOk&&(
            <div style={{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>ENTER LEADERBOARD NAME</div>
              <div style={{display:"flex",gap:8}}>
                <input style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,150,20,0.3)",borderRadius:6,padding:"10px 12px",color:"#E8E0D0",fontSize:13,outline:"none"}} placeholder="YourHandle" value={uname} onChange={e=>setUname(e.target.value)} maxLength={18}/>
                <button onClick={()=>{if(uname.trim())setNamedOk(true);}} style={{background:"linear-gradient(135deg,#C8A820,#FFD700)",color:"#0A0A0C",border:"none",borderRadius:6,padding:"10px 16px",fontSize:13,fontWeight:700}}>Submit</button>
              </div>
            </div>
          )}
          <div style={{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16}}>
            <div style={{fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>FACIAL MARKERS DETECTED</div>
            {traits(score).map(t=>(
              <div key={t.label} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontSize:12,color:"#FFD700",width:16}}>{t.icon}</span>
                <span style={{flex:1,fontSize:13,color:"#AAA"}}>{t.label}</span>
                <span style={{fontSize:12,fontWeight:600,color:t.icon==="◆"?"#FFD700":t.icon==="◈"?"#F5A623":"#777"}}>{t.value}</span>
              </div>
            ))}
          </div>
          <div style={{width:"100%",background:"rgba(200,150,20,0.04)",border:"1px solid rgba(200,150,20,0.12)",borderRadius:10,padding:16}}>
            <div style={{fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>OPTIMIZATION PROTOCOL</div>
            {recs(score).map((r,i)=>(
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
                <span style={{fontSize:10,color:"#C8A820",fontWeight:700,letterSpacing:1,paddingTop:2,flexShrink:0}}>0{i+1}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"#BBB",lineHeight:1.4}}>{r.text}</div>
                  {r.aff&&<a href={AFFILIATES[r.aff]} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#FFD700",textDecoration:"none",marginTop:3,display:"inline-block"}}>Get started →</a>}
                </div>
              </div>
            ))}
          </div>
          <div style={{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16}}>
            <div style={{fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>YOUR SCORE CARD</div>
            {shareUrl&&<img src={shareUrl} alt="share card" style={{width:"100%",borderRadius:6,marginBottom:12}}/>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={doShare} style={{background:"linear-gradient(135deg,#C8A820,#FFD700)",color:"#0A0A0C",border:"none",borderRadius:8,padding:"13px 22px",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>↓ Download</button>
              <button onClick={()=>{navigator.clipboard?.writeText(`My T-Index: ${score} (${R.label}) — tlevelapp.com`);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:"transparent",color:"#FFD700",border:"1px solid rgba(200,150,20,0.5)",borderRadius:8,padding:"13px 22px",fontSize:13,fontWeight:600}}>
                {copied?"✓ Copied!":"Copy Link"}
              </button>
            </div>
            <p style={{fontSize:10,color:"#444",margin:"8px 0 0",textAlign:"center"}}>Post to X / TikTok with #TLevel @tlevelapp</p>
          </div>
          <Board userScore={score} userStreak={streak} userName={namedOk?uname:"You"}/>
        </>
      )}
      <p style={{fontSize:10,color:"#333",textAlign:"center",lineHeight:1.5}}>AI estimate for entertainment purposes only. Not a medical diagnostic tool.</p>
      <button onClick={reset} style={{background:"transparent",color:"#FFD700",border:"1px solid rgba(200,150,20,0.5)",borderRadius:8,padding:"13px 22px",fontSize:13,fontWeight:600}}>↺ Scan Again</button>
    </main>
  )}

  <footer style={{padding:"16px 24px",fontSize:10,color:"#333",letterSpacing:2,textTransform:"uppercase",zIndex:1,textAlign:"center"}}>
    TLevel · tlevelapp.com · @tlevelapp · Not a medical device
  </footer>
</div>

);
